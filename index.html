<!DOCTYPE html>
<html lang="zh-CN">
<head>

  <title>我的生活记录</title>
  <style>
    body { font-family: Arial, sans-serif; line-height: 1.6; margin: 0; padding: 0; background: #f4f4f4; }

    nav a { margin: 0 1rem; color: white; text-decoration: none; }
    main { padding: 2rem; max-width: 800px; margin: auto; background: white; }
    img { max-width: 100%; height: auto; margin: 1rem 0; }
    footer { text-align: center; padding: 1rem; background: #333; color: white; margin-top: 2rem; }
  </style>

<body>
  <header>

      <img src="photo1.jpg" alt="风景1">
